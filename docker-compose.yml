services:
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_INTERNAL_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/mdav
      - JWT_SECRET=mdav-dev-secret-key
      - STORAGE_PATH=/app/storage
      - MDAV_VISION_WEIGHTS=/app/models/best.pth
      - MDAV_LAYOUT_WEIGHTS=/app/models/best_layout_detector.pt
      - MDAV_DIFFUSION_WEIGHTS=/app/models/best_diffusion.pth
      - MDAV_DIFFUSION_THRESHOLD=0.95
      # Optional local Transformers classifier fallback; unset by default.
      # - MDAV_DIFFUSION_MODEL=/app/models/diffusion
    depends_on:
      - db
    volumes:
      - ./storage:/app/storage
      # Canonical checkpoints live under ./models on the host.
      - ./models:/app/models
      - paddleocr_cache:/root/.paddleocr

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=mdav
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ml_service:
    build: ./ml_service
    ports:
      - "8001:8001"
    volumes:
      - ./models:/app/models:ro

volumes:
  pgdata:
  paddleocr_cache:
